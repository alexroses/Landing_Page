<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Obrigado! — Seu Gerente Digital</title>
  <meta name="robots" content="noindex,nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  <style>
    :root {
      --bg: #fef6f0;
      --text: #1a1d2e;
      --muted: #5c6178;
      --brand: #e6a800;
      --brand-hover: #d49800;
      --brand2: #0d9488;
      --accent-teal: rgba(13, 148, 136, 0.12);
    }
    body {
      font-family: "Plus Jakarta Sans", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
    }
    .card-thank {
      background: #fff;
      border-radius: 20px;
      border: 1px solid rgba(0,0,0,0.08);
      box-shadow: 0 8px 32px rgba(0,0,0,0.08);
      padding: 2.5rem;
    }
    .btn-brand {
      background: var(--brand);
      color: #1a1d2e;
      font-weight: 800;
      border: none;
      border-radius: 12px;
      padding: 0.85rem 1.2rem;
      box-shadow: 0 4px 14px rgba(230, 168, 0, 0.35);
    }
    .btn-brand:hover {
      background: var(--brand-hover);
      color: #1a1d2e;
    }
    .btn-outline-teal {
      border: 2px solid rgba(13, 148, 136, 0.3);
      color: var(--brand2);
      font-weight: 600;
      border-radius: 12px;
    }
    .btn-outline-teal:hover {
      background: var(--accent-teal);
      border-color: var(--brand2);
      color: var(--brand2);
    }
  </style>
</head>
<body>
  <div class="container py-5">
    <div class="mx-auto card-thank" style="max-width:560px">
      <h1 class="fw-bold mb-3">Perfeito <i class="bi bi-check-circle-fill text-success"></i></h1>
      <p class="lead text-secondary mb-4">
        Recebemos seu contato. Em breve eu te chamo no WhatsApp com a demo e a proposta do <strong>Seu Gerente Digital</strong>.
      </p>

      <a class="btn btn-brand" href="index.html">
        <i class="bi bi-arrow-left me-2"></i>Voltar para a página
      </a>

      <hr class="my-4" style="border-color: rgba(0,0,0,0.08);" />

      <p class="mb-2 text-secondary">Se quiser agilizar, clique aqui e me mande uma mensagem:</p>
      <a class="btn btn-outline-teal" target="_blank" rel="noopener"
         href="https://wa.me/5531983761554?text=Olá!%20Acabei%20de%20enviar%20o%20formulário%20do%20Seu%20Gerente%20Digital%20e%20quero%20agendar%20a%20demo.">
        <i class="bi bi-whatsapp me-2"></i>Falar no WhatsApp
      </a>
    </div>
  </div>
</body>
</html>
